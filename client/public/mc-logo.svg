<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" fill="none">
  <!-- MC Monogram -->
  <g transform="translate(130, 8)">
    <!-- M letterform -->
    <text x="0" y="72" font-family="Georgia, 'Times New Roman', serif" font-size="88" font-weight="700" fill="#1C2B5C" letter-spacing="-2">M</text>
    <!-- C letterform overlapping, slightly offset right and down -->
    <text x="44" y="82" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="400" fill="#8A8FA5">C</text>
  </g>

  <!-- MAUDSLAY wordmark -->
  <text x="200" y="120" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700" fill="#1C2B5C" letter-spacing="8" text-anchor="middle">MAUDSLAY</text>

  <!-- Decorative rules + CONSULTING -->
  <line x1="68" y1="138" x2="118" y2="138" stroke="#8A8FA5" stroke-width="1"/>
  <text x="200" y="143" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="400" fill="#8A8FA5" letter-spacing="6" text-anchor="middle">CONSULTING</text>
  <line x1="282" y1="138" x2="332" y2="138" stroke="#8A8FA5" stroke-width="1"/>
</svg>
